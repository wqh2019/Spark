<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark Agent</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            height: 100dvh;
        }

        .app {
            display: flex;
            height: 100vh;
            height: 100dvh;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header h1 {
            font-size: 1.3rem;
            font-weight: 500;
        }

        .sidebar-actions {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 8px;
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
            text-align: left;
            width: 100%;
        }

        .sidebar-btn:hover { background: rgba(255,255,255,0.15); color: white; }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .sidebar-footer a:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }

        /* Chat area */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            min-width: 0;
        }

        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            flex-shrink: 0;
        }

        .chat-header .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .chat-header .status.connected { background: #27ae60; }
        .chat-header .status.disconnected { background: #e74c3c; }

        .chat-header .status-text {
            font-size: 0.85rem;
            color: #999;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 4px;
            color: #666;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
            font-size: 1.1rem;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .message.user {
            background: #3498db;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: #f0f2f5;
            color: #2c3e50;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.system {
            background: #fff3cd;
            color: #856404;
            align-self: center;
            font-size: 0.85rem;
            max-width: 90%;
            border-radius: 8px;
        }

        .tool-call {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 10px 12px;
            margin: 8px 0 4px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .tool-name { font-weight: 600; color: #2e7d32; }
        .tool-args { background: #f5f5f5; padding: 6px 8px; margin: 6px 0; border-radius: 4px; font-family: monospace; font-size: 0.8rem; overflow-x: auto; white-space: pre-wrap; }
        .tool-result { color: #666; margin-top: 6px; }

        /* Typing indicator */
        .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
        .typing span { width: 7px; height: 7px; background: #95a5a6; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Input area */
        .input-area {
            padding: 12px 20px 16px;
            border-top: 1px solid #eee;
            background: #fafafa;
            flex-shrink: 0;
        }

        .input-form {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
        }

        .input-form input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-form input:focus { border-color: #3498db; }
        .input-form input:disabled { background: #f5f5f5; }

        .send-btn {
            padding: 12px 22px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) { background: #2980b9; }
        .send-btn:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -240px;
                top: 0;
                bottom: 0;
                z-index: 100;
                transition: left 0.25s ease;
                width: 220px;
            }

            .sidebar.open { left: 0; }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.4);
                z-index: 99;
            }

            .sidebar-overlay.open { display: block; }

            .mobile-menu-btn { display: block; }

            .message { max-width: 88%; }

            .messages { padding: 16px; }

            .input-area { padding: 10px 12px 14px; }

            .send-btn { padding: 12px 16px; }
        }

        @media (min-width: 1400px) {
            .messages { padding: 24px 48px; }
            .message { max-width: 65%; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app">
            <!-- Mobile overlay -->
            <div :class="['sidebar-overlay', { open: sidebarOpen }]" @click="sidebarOpen = false"></div>

            <!-- Sidebar -->
            <div :class="['sidebar', { open: sidebarOpen }]">
                <div class="sidebar-header">
                    <h1>🔥 Spark Agent</h1>
                </div>
                <div class="sidebar-actions">
                    <button class="sidebar-btn" @click="clearChat">
                        🗑️ 清空对话
                    </button>
                </div>
                <div class="sidebar-footer">
                    <a href="/admin">📊 管理后台</a>
                </div>
            </div>

            <!-- Chat -->
            <div class="chat">
                <div class="chat-header">
                    <button class="mobile-menu-btn" @click="sidebarOpen = !sidebarOpen">☰</button>
                    <span :class="['status', connected ? 'connected' : 'disconnected']"></span>
                    <span class="status-text">{{ connected ? '已连接' : '未连接' }}</span>
                </div>

                <div class="messages" ref="messagesEl">
                    <div v-if="messages.length === 0" class="empty-state">发送一条消息开始对话</div>
                    <template v-for="(msg, i) in messages" :key="i">
                        <div v-if="msg.type === 'user'" class="message user">{{ msg.content }}</div>
                        <div v-else-if="msg.type === 'system'" class="message system">{{ msg.content }}</div>
                        <div v-else-if="msg.type === 'assistant'" class="message assistant">
                            {{ msg.content }}
                            <div v-if="msg.typing" class="typing"><span></span><span></span><span></span></div>
                            <div v-for="(tool, j) in msg.tools" :key="j" class="tool-call">
                                <div class="tool-name">🔧 {{ tool.name }}</div>
                                <div class="tool-args">{{ tool.argsText }}</div>
                                <div class="tool-result">{{ tool.result || '执行中...' }}</div>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="input-area">
                    <form class="input-form" @submit.prevent="send">
                        <input
                            v-model="input"
                            :disabled="!connected || sending"
                            placeholder="输入消息..."
                            autocomplete="off"
                            @keydown.enter.exact.prevent="send"
                        >
                        <button class="send-btn" type="submit" :disabled="!connected || sending || !input.trim()">发送</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
    const { createApp, ref, nextTick, onMounted, onUnmounted } = Vue;

    createApp({
        setup() {
            const sessionId = Math.random().toString(36).substring(2, 15);
            const messages = ref([]);
            const input = ref('');
            const connected = ref(false);
            const sending = ref(false);
            const sidebarOpen = ref(false);
            const messagesEl = ref(null);

            let ws = null;
            let currentAssistant = null;

            function connect() {
                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${location.host}/ws/${sessionId}`);

                ws.onopen = () => {
                    connected.value = true;
                    addSystem('已连接到服务器');
                };

                ws.onclose = () => {
                    connected.value = false;
                    addSystem('连接已断开，正在重连...');
                    setTimeout(connect, 2000);
                };

                ws.onerror = () => {};

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    handleMsg(data);
                };
            }

            function handleMsg(data) {
                switch (data.type) {
                    case 'text_delta':
                        if (!currentAssistant) startAssistant();
                        currentAssistant.content += data.delta;
                        scrollBottom();
                        break;
                    case 'tool_call':
                        if (!currentAssistant) startAssistant();
                        currentAssistant.tools.push({
                            name: data.name,
                            argsText: JSON.stringify(data.args, null, 2),
                            result: null,
                        });
                        scrollBottom();
                        break;
                    case 'tool_result':
                        if (currentAssistant) {
                            const tool = currentAssistant.tools.find(t => t.name === data.name && t.result === null);
                            if (tool) tool.result = `结果: ${data.result}`;
                        }
                        break;
                    case 'done':
                        if (currentAssistant) currentAssistant.typing = false;
                        currentAssistant = null;
                        sending.value = false;
                        break;
                    case 'error':
                        addSystem('错误: ' + data.message);
                        if (currentAssistant) currentAssistant.typing = false;
                        currentAssistant = null;
                        sending.value = false;
                        break;
                    case 'cleared':
                        messages.value = [];
                        addSystem('对话已清空');
                        break;
                }
            }

            function addSystem(content) {
                messages.value.push({ type: 'system', content });
                scrollBottom();
            }

            function startAssistant() {
                const msg = { type: 'assistant', content: '', tools: [], typing: true };
                messages.value.push(msg);
                currentAssistant = msg;
            }

            function send() {
                const text = input.value.trim();
                if (!text || !connected.value || sending.value) return;

                messages.value.push({ type: 'user', content: text });
                input.value = '';
                sending.value = true;

                ws.send(JSON.stringify({ type: 'chat', content: text }));
                scrollBottom();
            }

            function clearChat() {
                if (ws && connected.value) {
                    ws.send(JSON.stringify({ type: 'clear' }));
                }
                sidebarOpen.value = false;
            }

            function scrollBottom() {
                nextTick(() => {
                    const el = messagesEl.value;
                    if (el) el.scrollTop = el.scrollHeight;
                });
            }

            onMounted(connect);

            onUnmounted(() => {
                if (ws) ws.close();
            });

            return { messages, input, connected, sending, sidebarOpen, messagesEl, send, clearChat };
        },
    }).mount('#app');
    </script>
</body>
</html>
