<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark Agent</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            height: 100dvh;
        }

        .app {
            display: flex;
            height: 100vh;
            height: 100dvh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .new-chat-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            padding: 6px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .new-chat-btn:hover { background: rgba(255,255,255,0.2); }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .session-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            gap: 10px;
            margin-bottom: 2px;
        }

        .session-item:hover { background: rgba(255,255,255,0.08); }
        .session-item.active { background: rgba(255,255,255,0.15); }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-title {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.9);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-time {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.55);
            margin-top: 3px;
        }

        .session-delete {
            opacity: 0;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .session-item:hover .session-delete { opacity: 1; }
        .session-delete:hover { color: #e74c3c; }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .sidebar-footer a:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }

        /* Chat area */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            min-width: 0;
        }

        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            flex-shrink: 0;
        }

        .chat-header .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .chat-header .status.connected { background: #27ae60; }
        .chat-header .status.disconnected { background: #e74c3c; }

        .chat-header .status-text {
            font-size: 0.85rem;
            color: #999;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 4px;
            color: #666;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
            font-size: 1.1rem;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .msg-time {
            font-size: 0.7rem;
            margin-top: 4px;
            opacity: 0.5;
        }

        .message.user .msg-time { text-align: right; }

        .message.user {
            background: #3498db;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: #f0f2f5;
            color: #2c3e50;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.system {
            background: #fff3cd;
            color: #856404;
            align-self: center;
            font-size: 0.85rem;
            max-width: 90%;
            border-radius: 8px;
        }

        .tool-call {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 10px 12px;
            margin: 8px 0 4px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .tool-name { font-weight: 600; color: #2e7d32; }
        .tool-args { background: #f5f5f5; padding: 6px 8px; margin: 6px 0; border-radius: 4px; font-family: monospace; font-size: 0.8rem; overflow-x: auto; white-space: pre-wrap; }
        .tool-result { color: #666; margin-top: 6px; }

        /* Typing indicator */
        .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
        .typing span { width: 7px; height: 7px; background: #95a5a6; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Input area */
        .input-area {
            padding: 12px 20px 16px;
            border-top: 1px solid #eee;
            background: #fafafa;
            flex-shrink: 0;
        }

        .input-form {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
        }

        .input-form input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-form input:focus { border-color: #3498db; }
        .input-form input:disabled { background: #f5f5f5; }

        .send-btn {
            padding: 12px 22px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) { background: #2980b9; }
        .send-btn:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 100;
                transition: left 0.25s ease;
                width: 260px;
            }

            .sidebar.open { left: 0; }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.4);
                z-index: 99;
            }

            .sidebar-overlay.open { display: block; }

            .mobile-menu-btn { display: block; }

            .message { max-width: 88%; }
            .messages { padding: 16px; }
            .input-area { padding: 10px 12px 14px; }
            .send-btn { padding: 12px 16px; }
        }

        @media (min-width: 1400px) {
            .messages { padding: 24px 48px; }
            .message { max-width: 65%; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app">
            <!-- Mobile overlay -->
            <div :class="['sidebar-overlay', { open: sidebarOpen }]" @click="sidebarOpen = false"></div>

            <!-- Sidebar -->
            <div :class="['sidebar', { open: sidebarOpen }]">
                <div class="sidebar-header">
                    <h1>🔥 Spark</h1>
                    <button class="new-chat-btn" @click="newChat">+ 新对话</button>
                </div>
                <div class="session-list">
                    <div
                        v-for="s in sessions"
                        :key="s.session_id"
                        :class="['session-item', { active: s.session_id === currentSessionId }]"
                        @click="switchSession(s.session_id)"
                    >
                        <div class="session-info">
                            <div class="session-title">{{ s.title }}</div>
                            <div class="session-time">{{ formatTime(s.updated_at) }}</div>
                        </div>
                        <button class="session-delete" @click.stop="deleteSession(s.session_id)" title="删除">✕</button>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <a href="/admin">📊 管理后台</a>
                </div>
            </div>

            <!-- Chat -->
            <div class="chat">
                <div class="chat-header">
                    <button class="mobile-menu-btn" @click="sidebarOpen = !sidebarOpen">☰</button>
                    <span :class="['status', connected ? 'connected' : 'disconnected']"></span>
                    <span class="status-text">{{ connected ? '已连接' : '未连接' }}</span>
                </div>

                <div class="messages" ref="messagesEl">
                    <div v-if="messages.length === 0" class="empty-state">发送一条消息开始对话</div>
                    <template v-for="(msg, i) in messages" :key="i">
                        <div v-if="msg.type === 'user'" class="message user">
                            {{ msg.content }}
                            <div class="msg-time">{{ formatMsgTime(msg.time) }}</div>
                        </div>
                        <div v-else-if="msg.type === 'system'" class="message system">{{ msg.content }}</div>
                        <div v-else-if="msg.type === 'assistant'" class="message assistant">
                            {{ msg.content }}
                            <div v-if="msg.typing" class="typing"><span></span><span></span><span></span></div>
                            <div v-for="(tool, j) in msg.tools" :key="j" class="tool-call">
                                <div class="tool-name">🔧 {{ tool.name }}</div>
                                <div class="tool-args">{{ tool.argsText }}</div>
                                <div class="tool-result">{{ tool.result || '执行中...' }}</div>
                            </div>
                            <div v-if="msg.time && !msg.typing" class="msg-time">{{ formatMsgTime(msg.time) }}</div>
                        </div>
                    </template>
                </div>

                <div class="input-area">
                    <form class="input-form" @submit.prevent="send">
                        <input
                            v-model="input"
                            :disabled="!connected || sending"
                            placeholder="输入消息..."
                            autocomplete="off"
                            @keydown.enter.exact.prevent="send"
                        >
                        <button class="send-btn" type="submit" :disabled="!connected || sending || !input.trim()">发送</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
    const { createApp, ref, nextTick, onMounted, onUnmounted, watch } = Vue;

    createApp({
        setup() {
            const messages = ref([]);
            const input = ref('');
            const connected = ref(false);
            const sending = ref(false);
            const sidebarOpen = ref(false);
            const messagesEl = ref(null);
            const sessions = ref([]);
            const currentSessionId = ref('');

            let ws = null;
            let currentAssistant = null;
            let reconnectTimer = null;

            // ── Session management ──

            function generateId() {
                return Math.random().toString(36).substring(2, 15);
            }

            async function fetchSessions() {
                try {
                    const r = await fetch('/api/sessions');
                    const data = await r.json();
                    sessions.value = data.sessions || [];
                } catch (e) { console.error('fetchSessions', e); }
            }

            async function loadHistory(sid) {
                try {
                    const r = await fetch(`/api/sessions/${sid}/history`);
                    const data = await r.json();
                    return data.messages || [];
                } catch (e) { console.error('loadHistory', e); return []; }
            }

            async function deleteSession(sid) {
                try {
                    await fetch(`/api/sessions/${sid}`, { method: 'DELETE' });
                } catch (e) { console.error('deleteSession', e); }
                // If deleting current session, switch to new one
                if (sid === currentSessionId.value) {
                    newChat();
                }
                await fetchSessions();
            }

            function newChat() {
                switchSession(generateId());
            }

            async function switchSession(sid) {
                if (sid === currentSessionId.value && connected.value) {
                    sidebarOpen.value = false;
                    return;
                }

                // Disconnect current WS
                disconnectWs();

                currentSessionId.value = sid;
                messages.value = [];
                currentAssistant = null;
                sending.value = false;
                sidebarOpen.value = false;

                // Load history from server
                const history = await loadHistory(sid);
                for (const msg of history) {
                    if (msg.role === 'user') {
                        messages.value.push({ type: 'user', content: msg.content, time: msg.timestamp });
                    } else if (msg.role === 'assistant') {
                        messages.value.push({ type: 'assistant', content: msg.content, tools: [], typing: false, time: msg.timestamp });
                    }
                }
                scrollBottom();

                // Connect WS with new session
                connectWs(sid);
            }

            // ── WebSocket ──

            function connectWs(sid) {
                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${location.host}/ws/${sid}`);

                ws.onopen = () => {
                    connected.value = true;
                    addSystem('已连接到服务器');
                };

                ws.onclose = () => {
                    connected.value = false;
                    if (currentSessionId.value === sid) {
                        addSystem('连接已断开，正在重连...');
                        reconnectTimer = setTimeout(() => connectWs(sid), 2000);
                    }
                };

                ws.onerror = () => {};

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    handleMsg(data);
                };
            }

            function disconnectWs() {
                if (ws) {
                    // Temporarily clear sessionId so onclose doesn't reconnect
                    const savedSid = currentSessionId.value;
                    currentSessionId.value = '';
                    ws.close();
                    ws = null;
                    currentSessionId.value = savedSid;
                }
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
                connected.value = false;
            }

            function handleMsg(data) {
                switch (data.type) {
                    case 'text_delta':
                        if (!currentAssistant) startAssistant();
                        currentAssistant.content += data.delta;
                        scrollBottom();
                        break;
                    case 'tool_call':
                        if (!currentAssistant) startAssistant();
                        currentAssistant.tools.push({
                            name: data.name,
                            argsText: JSON.stringify(data.args, null, 2),
                            result: null,
                        });
                        scrollBottom();
                        break;
                    case 'tool_result':
                        if (currentAssistant) {
                            const tool = currentAssistant.tools.find(t => t.name === data.name && t.result === null);
                            if (tool) tool.result = `结果: ${data.result}`;
                        }
                        break;
                    case 'done':
                        if (currentAssistant) currentAssistant.typing = false;
                        currentAssistant = null;
                        sending.value = false;
                        fetchSessions(); // Refresh session list (title may have changed)
                        break;
                    case 'error':
                        addSystem('错误: ' + data.message);
                        if (currentAssistant) currentAssistant.typing = false;
                        currentAssistant = null;
                        sending.value = false;
                        break;
                    case 'cleared':
                        messages.value = [];
                        addSystem('对话已清空');
                        fetchSessions();
                        break;
                }
            }

            function addSystem(content) {
                messages.value.push({ type: 'system', content });
                scrollBottom();
            }

            function startAssistant() {
                const msg = { type: 'assistant', content: '', tools: [], typing: true, time: new Date().toISOString() };
                messages.value.push(msg);
                currentAssistant = msg;
            }

            function send() {
                const text = input.value.trim();
                if (!text || !connected.value || sending.value) return;

                messages.value.push({ type: 'user', content: text, time: new Date().toISOString() });
                input.value = '';
                sending.value = true;

                ws.send(JSON.stringify({ type: 'chat', content: text }));
                scrollBottom();
            }

            function scrollBottom() {
                nextTick(() => {
                    const el = messagesEl.value;
                    if (el) el.scrollTop = el.scrollHeight;
                });
            }

            function formatTime(isoStr) {
                if (!isoStr) return '';
                try {
                    const d = new Date(isoStr);
                    if (isNaN(d.getTime())) return '';
                    const now = new Date();
                    const isToday = d.toDateString() === now.toDateString();
                    if (isToday) {
                        return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
                    }
                    const yesterday = new Date(now);
                    yesterday.setDate(yesterday.getDate() - 1);
                    if (d.toDateString() === yesterday.toDateString()) {
                        return '昨天 ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
                    }
                    return d.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }) + ' ' +
                           d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
                } catch { return ''; }
            }

            function formatMsgTime(isoStr) {
                if (!isoStr) return '';
                try {
                    const d = new Date(isoStr);
                    if (isNaN(d.getTime())) return '';
                    const now = new Date();
                    const time = d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
                    if (d.toDateString() === now.toDateString()) return time;
                    const yesterday = new Date(now);
                    yesterday.setDate(yesterday.getDate() - 1);
                    if (d.toDateString() === yesterday.toDateString()) return '昨天 ' + time;
                    return d.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }) + ' ' + time;
                } catch { return ''; }
            }

            // ── Lifecycle ──

            onMounted(async () => {
                await fetchSessions();

                // Check if URL has a session hash, or pick the most recent, or create new
                const hashSid = location.hash.replace('#', '');
                if (hashSid) {
                    await switchSession(hashSid);
                } else if (sessions.value.length > 0) {
                    await switchSession(sessions.value[0].session_id);
                } else {
                    await switchSession(generateId());
                }
            });

            onUnmounted(() => {
                disconnectWs();
            });

            // Update URL hash when switching sessions
            watch(currentSessionId, (sid) => {
                if (sid) history.replaceState(null, '', '#' + sid);
            });

            return {
                messages, input, connected, sending, sidebarOpen, messagesEl,
                sessions, currentSessionId,
                send, newChat, switchSession, deleteSession, formatTime, formatMsgTime,
            };
        },
    }).mount('#app');
    </script>
</body>
</html>
